# ytmetrics configuration — copy to config.toml and fill in.
# config.toml is gitignored. Channel IDs come from `ytmetrics list-channels`.

db_path = "ytmetrics.db"            # the SQLite system of record

# --- Backups (pre-modification daily snapshot of the db) ---
backup_before_pull    = true        # snapshot before the first modifying run each day
backup_dir            = "backups"
backup_retention_days = 14          # prune snapshots older than this

# --- Safety / observability ---
max_api_calls_per_run = 2000        # runaway guard; abort if exceeded (a daily run uses ~8)
log_dir               = "logs"
log_level             = "INFO"      # DEBUG via `--verbose`; secrets are always redacted
heartbeat_seconds     = 3           # cadence of the "still working" status line
freshness_warn_days   = 3           # warn if data_through falls this far behind today
insights_retention_weeks = 26       # keep ~6mo of windowed insight snapshots; 0 = keep all

# --- Email the weekly briefing PDF (opt-in; used by `ytmetrics briefing --email`) ---
# The password is NOT stored here: it comes from $YTMETRICS_SMTP_PASSWORD, or the
# gitignored file secrets/smtp_password. For Gmail, use an App Password (needs 2FA).
[email]
smtp_host = "smtp.gmail.com"
smtp_port = 587
username  = "you@example.com"
from      = "you@example.com"
to        = "you@example.com"   # string or array of recipients
# password_env  = "YTMETRICS_SMTP_PASSWORD"   # default
# password_file = "secrets/smtp_password"     # default fallback

# --- Optional failure hook (default off) ---
# Exactly one of command / webhook may be set.
# [on_failure]
# command = "say ytmetrics failed"          # any shell command
# webhook = "https://hooks.example.com/..."  # receives a JSON POST

# --- Channels (one block per channel) ---
# Channels under one Google account share a token; different accounts use different
# token_file paths.
[[channels]]
name            = "main"
channel_id      = "mine"            # "mine" = the account's default channel, or a UC… id
client_secret   = "secrets/client_secret.json"
secret_backend  = "file"           # file (default) | keychain | env
token_file      = "secrets/token_main.json"   # used by the "file" backend
include_revenue = true             # attempt the monetary report; degrade if unavailable
track_revisions = true             # record changed values into the revision_log table
