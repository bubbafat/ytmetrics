name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history so gitleaks can scan commits

      # Run the gitleaks CLI directly instead of gitleaks/gitleaks-action@v2.
      # The action now requires a GITLEAKS_LICENSE key (and pins a deprecated Node 20
      # runtime); the CLI is MIT-licensed and needs no key. Non-zero exit = leak found.
      - name: Scan for secrets (gitleaks CLI)
        run: |
          ver=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest (offline)
        run: uv run pytest
